<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — Painel Sir Fisher Praia</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="../assets/img/favicon.png" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main">
      <div class="page-header">
        <h1>Dashboard</h1>
      </div>

      <div class="stat-bar" id="stat-bar"></div>

      <div class="card mb-16">
        <div class="cal-header">
          <button id="cal-prev" class="btn btn--outline btn--sm" type="button" aria-label="Mês anterior">‹</button>
          <div class="cal-header__label">
            <h2 class="section-title" id="cal-month-label" style="margin:0;">&nbsp;</h2>
            <button id="cal-today" class="btn btn--outline btn--sm" type="button">Hoje</button>
          </div>
          <button id="cal-next" class="btn btn--outline btn--sm" type="button" aria-label="Próximo mês">›</button>
        </div>
        <div class="cal-wrap">
          <div id="calendar-grid" class="cal-grid"></div>
        </div>
      </div>

      <div class="card mb-16">
        <h2 class="section-title" style="margin-bottom:10px;">Pessoas previstas por horário (hoje)</h2>
        <div id="by-slot-list" class="text-soft">Carregando…</div>
      </div>

      <div class="card">
        <h2 class="section-title" style="margin-bottom:10px;">Próximas reservas de hoje</h2>
        <div id="upcoming-list" class="text-soft">Carregando…</div>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/adminDashboard.js"></script>
</body>
</html>
